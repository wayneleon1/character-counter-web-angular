<app-header (themeChanged)="onThemeChange($event)"></app-header>

<main class="container">
  <h1>Analyze your text<br />in real-time.</h1>

  <app-text-input
    [readingTime]="readingTime"
    (textChanged)="handleTextChange($event)"
    (configChanged)="handleConfigChange($event)"
  >
  </app-text-input>

  <app-stats [charCount]="charCount" [wordCount]="wordCount" [sentenceCount]="sentenceCount">
  </app-stats>

  <app-density [densityData]="densityData"></app-density>
</main>
